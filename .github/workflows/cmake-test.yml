name: Compile Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compile-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ make

      - name: Configure CMake
        run: |
          cmake -S . -B build

      - name: Check compilation
        run: |
          cd build
          make
