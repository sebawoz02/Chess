name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ make

      - name: Configure CMake
        run: |
          cmake -S . -B build

      - name: Build tests
        run: |
          cmake --build build --parallel

      - name: Run unit tests
        run: |
          cd build
          ctest --output-on-failure
